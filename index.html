t das primäre Ziel bei einer Messerbedrohung?",options:["Das Messer entwaffnen","Treffer vermeiden, Distanz schaffen, fliehen","Das Messer festhalten","Den Angreifer überwältigen"],correctIndex:1,explanation:'Bei Messerbedrohung: primäres Ziel ist Treffer vermeiden — kein Messerangriff ist "gewonnen", du nimmst immer ein Risiko. Fliehen ist immer die beste Option.'},{id:"m9q2",question:'Was sind "Hiebwaffen" im M.I. Kontext?',options:["Pistolen","Schlagwaffen wie Stöcke, Rohre, Riemen","Klingen","Improvised Tools"],correctIndex:1,explanation:"Hiebwaffen sind Schlagwaffen (Stock, Rohr, Kette, Riemen) — im Gegensatz zu Stichwaffen (Messer). Andere Angriffswinkel, andere Verteidigungsstrategien."},{id:"m9q3",question:'Was ist "Winkelarbeit" bei der Waffen-Verteidigung?',options:["Das Abmessen von Winkeln","Bewegung aus der Angriffslinie heraus durch Seitwärts- oder Diagonalbewegung","Eine Hebeltechnik","Das Deflektieren von Schlägen"],correctIndex:1,explanation:"Winkelarbeit bedeutet: sich aus der direkten Angriffslinie bewegen — seitwärts oder diagonal — damit der Angriff ins Leere geht oder umgelenkt werden kann."},{id:"m9q4",question:"Warum ist Distanzmanagement bei Waffen besonders kritisch?",options:["Wegen der Reichweite","Weil Waffen die Reichweite verlängern und außerhalb der Waffen-Reichweite zu sein lebensrettend ist","Für technische Präzision","Wegen der Regeln"],correctIndex:1,explanation:"Eine Waffe verlängert die effektive Reichweite des Angreifers erheblich — außerhalb dieser Reichweite zu sein ist die sicherste Position überhaupt."},{id:"m9q5",question:'Was ist das "Dry Side" Prinzip bei Messerverteidigung?',options:["Die unbewaffnete Seite","Die Seite des Angreifers die keine Waffe hält — dort ist die Verteidigung sicherer","Trockentraining","Die defensive Seite"],correctIndex:1,explanation:'Die "Dry Side" ist die waffenfreie Seite des Angreifers — Bewegung auf diese Seite gibt dir relative Sicherheit da die Waffe weiter entfernt ist.'},{id:"m9q6",question:"Was ist das größte Missverständnis bei der Messerabwehr?",options:["Dass es einfach ist",'Dass man das Messer "entwaffnen" kann ohne sich dabei zu schneiden',"Dass Fliehen möglich ist","Dass Distanz hilft"],correctIndex:1,explanation:"Das größte Missverständnis: man kann das Messer sauber entwaffnen. In Wirklichkeit wird man bei einem echten Messerangriff fast immer Schnittwunden erleiden — das Ziel ist, diese minimal zu halten."},{id:"m9q7",question:'Was sind "technische Verteidigungsprinzipien" bei Waffen?',options:["Feste Techniken für jede Situation","Grundprinzipien wie Winkelarbeit, Distanz, Deflection die auf viele Waffen-Situationen anwendbar sind","Nur für Spezialisten","Militärische Taktiken"],correctIndex:1,explanation:"Technische Prinzipien (Winkelarbeit, Distanz, Deflection) sind universell — sie gelten für Messer, Stock und andere Waffen, anstatt separate Techniken für jede Waffe."},{id:"m9q8",question:"Was sollte man tun wenn man eine Messerbedrohung von weitem erkennt?",options:["Direkt konfrontieren","Sofort Distanz schaffen und fliehen bevor eine echte Gefahrensituation entsteht","Zeuge suchen","Laut rufen"],correctIndex:1,explanation:"Frühe Erkennung = frühe Reaktion. Wenn das Messer gesehen wird bevor man in Reichweite ist — fliehen. Das ist immer die beste Option."},{id:"m9q9",question:"Warum sind improvisierte Schilde effektiv gegen Messer?",options:["Sie stoppen das Messer komplett","Sie absorbieren oder deflektieren den Stich/Schnitt und schützen kritische Körperstellen","Sie sind stabiler als Unterarme","Für psychologischen Effekt"],correctIndex:1,explanation:"Ein Rucksack, eine Jacke, ein Brett — alles was zwischen Messer und Körper kommt kann Stiche absorbieren und gibt dir Zeit und Distanz."},{id:"m9q10",question:"Was ist der Unterschied zwischen einer Messer-Bedrohung und einem Messer-Angriff?",options:["Kein Unterschied","Bei Bedrohung wird das Messer gezeigt ohne direkten Angriff — bei Angriff bewegt sich das Messer auf dich zu","Bedrohung ist gefährlicher","Angriff ist seltener"],correctIndex:1,explanation:"Bedrohung = Messer sichtbar, kein direkter Angriff (z.B. Raubüberfall). Angriff = das Messer kommt auf dich zu. Sehr unterschiedliche Reaktionen notwendig."},{id:"m9q11",question:'Was sind "Deflection"-Techniken?',options:["Das Messer wegstoßen","Das Umlenken der Angriffswaffe von der eigenen Körperlinie ohne direkten Gegenstopp","Blocken der Waffe","Ausweichen"],correctIndex:1,explanation:"Deflection = die Waffe umlenken statt dagegenstoppen — du reduzierst Kraft gegen Kraft und nutzt die Energie des Angriffs um die Waffe an dir vorbeizuführen."},{id:"m9q12",question:"Wann ist eine Messerabwehr-Technik angemessen zu verteidigen?",options:["Niemals — immer fliehen","Wenn Flucht nicht möglich ist und ein direkter Angriff stattfindet","Immer wenn ein Messer sichtbar ist","Nur für trainierte Kämpfer"],correctIndex:1,explanation:"Abwehrtechnik nur wenn Flucht NICHT möglich ist — Messerabwehr ist immer riskant. Wenn Flucht möglich ist, ist das immer die bessere Option."},{id:"m9q13",question:'Was ist ein "Mata Angin" oder Winkelschlag bei Stockwaffen?',options:["Ein Schlag von oben","Angriffe aus verschiedenen Winkeln (diagonal, horizontal, vertikal) die unterschiedliche Abwehrstrategien erfordern","Ein Spezialterminus aus Eskrima","Ein defensiver Block"],correctIndex:1,explanation:"Winkelschläge kommen aus verschiedenen Richtungen — das Verteidigungsprinzip muss für jeden Winkel angepasst werden. Das ist die Basis des Eskrima-basierten Stockkampfs."},{id:"m9q14",question:"Was ist das Hauptprinzip der Messerverteidigung laut M.I.?",options:["Niemals ausweichen","Weg von der Waffe, Deflection, minimaler Körperschaden, dann Flucht","Immer angreifen","Kontrolle über das Messer gewinnen"],correctIndex:1,explanation:"Das Hauptprinzip: Weg von der Waffe (Winkelarbeit), Deflection des Angriffs, dann sofort Flucht. Minimaler Kontakt mit der Waffe, kein heroisches Entwaffnen."},{id:"m9q15",question:"Warum ist M.I. Modul 9 auf Tactical Level?",options:["Weil es schwierig ist","Weil Waffen-Verteidigung fortgeschrittene Grundlagen erfordert und für ernste Situationen gilt","Wegen der Verletzungsgefahr im Training","Weil es teuer zu unterrichten ist"],correctIndex:1,explanation:"Waffenverteidigung erfordert solide Grundlagen aus Conflict und Combat — Winkelarbeit, Distanz, Clinch, Bodenkampf-Prävention sind Voraussetzungen für effektive Waffenverteidigung."}],cb=[{id:"m10q1",question:'Was ist das Ziel von Modul 10 "Tactics & Survival"?',options:["Alle Techniken nochmal üben","Kombination aller Module in komplexen Szenarien unter extremem Entscheidungsdruck","Das finale Grading vorbereiten","Neue Techniken lernen"],correctIndex:1,explanation:"Modul 10 kombiniert alles — alle Module werden in komplexen, variierenden Szenarien unter realem Entscheidungsdruck integriert. Das Finale des Trainingskonzepts."},{id:"m10q2",question:'Was sind "Szenarien" im M.I. Training?',options:["Theaterstücke","Realistische Rollenspiele die echte Konfliktsituationen simulieren","Gefahrenanalysen","Prüfungssituationen"],correctIndex:1,explanation:"Szenarien sind realistische Simulationen echter Konfliktsituationen — in der Straße, im Fahrzeug, mit Waffen, mit mehreren Gegnern — um Entscheidungsdruck zu trainieren."},{id:"m10q3",question:'Was bedeutet "Kombination aller Module"?',options:["Alle Techniken in einem Kampf nutzen","Flexibler Wechsel zwischen den Fähigkeiten aller Module je nach Situationsanforderung","Die Module in Reihenfolge anwenden","Module 1-9 nacheinander wiederholen"],correctIndex:1,explanation:"Kombination bedeutet: situationsadaptiv zwischen Stand, Boden, Waffen, Clinch, Tools wechseln — nicht starr an eine Methode gebunden sein."},{id:"m10q4",question:'Was ist "Entscheidungsdruck" im Training?',options:["Stress beim Grading","Simulierter Zeitdruck und Komplexität die echte Entscheidungssituationen nachbildet","Wettkampfdruck","Instructor-Bewertungsdruck"],correctIndex:1,explanation:"Entscheidungsdruck wird simuliert: Zeitdruck, mehrere Optionen, unvollständige Information, Stressfaktoren — damit echte Reaktionen im Ernstfall automatisch werden."},{id:"m10q5",question:'Was ist "Stop the Bleed" und warum ist es in Modul 10?',options:["Ein Kampfprinzip","Erste-Hilfe-Kenntnisse für lebensbedrohliche Blutungen — nach einem Konflikt kann Erstversorgung entscheidend sein","Eine Defensivtechnik","Ein psychologisches Konzept"],correctIndex:1,explanation:'"Stop the Bleed" sind Erste-Hilfe-Kenntnisse für unkontrollierte Blutungen. Nach einem Konflikt können Verletzungen auftreten die sofortige Erstversorgung erfordern.'},{id:"m10q6",question:'Was bedeutet "Verhalten nach Gewalt"?',options:["Einen Arzt aufsuchen","Psychologische und rechtliche Konsequenzen kennen und richtig reagieren nach einer Konfliktsituation","Die Polizei anrufen","Zeugen befragen"],correctIndex:1,explanation:"Verhalten nach Gewalt umfasst: Notruf, Zeugen sichern, keine Aussagen ohne Anwalt, psychologische Verarbeitung — das wird oft ignoriert aber ist rechtlich und mental entscheidend."},{id:"m10q7",question:'Was sind "verschiedene Umgebungen" im Kontext von Modul 10?',options:["Verschiedene Trainingshallen","Training in verschiedenen realen Settings: enge Gänge, Treppen, Fahrzeug, öffentliche Orte","Internationale Trainingsstandorte","Outdoor vs. Indoor"],correctIndex:1,explanation:"Verschiedene Umgebungen: enger Flur, Treppe, Auto, Supermarkt — jede Umgebung verändert Taktik und mögliche Techniken. Situationsangepasstes Training."},{id:"m10q8",question:"Warum ist Training bei sich ändernden Lichtverhältnissen wichtig?",options:["Für Nachtschichten","Weil echte Konflikte oft bei schlechtem Licht stattfinden (Nacht, dunkle Parkhäuser)","Für Filmaufnahmen","Nur für Polizisten"],correctIndex:1,explanation:"Viele echte Übergriffe finden bei Dunkelheit oder schlechtem Licht statt — Training nur im hellen Trainingssaal bereitet nicht auf diese Realität vor."},{id:"m10q9",question:'Was ist das "After-Action Review" Prinzip?',options:["Eine Prüfung nach dem Training","Analyse von Szenarien direkt nach der Durchführung um Lerneffekte zu maximieren","Ein militärischer Begriff ohne Relevanz","Feedback vom Instructor"],correctIndex:1,explanation:"After-Action Review: direkt nach einem Szenario analysieren — was funktioniert hat, was nicht, was man anders tun würde. Das maximiert den Lerneffekt von Szenarien."},{id:"m10q10",question:"Warum ist Modul 10 das letzte im Tactical-Level?",options:["Weil es am schwierigsten ist","Weil alle Vorkenntnisse der Module 1-9 als Grundlage benötigt werden","Wegen der Reihenfolge im Lehrplan","Weil es am meisten Zeit braucht"],correctIndex:1,explanation:"Modul 10 ist die Integration aller vorherigen Module — ohne solide Grundlagen aus Modulen 1-9 sind die komplexen Szenarien von Modul 10 nicht sinnvoll trainierbar."},{id:"m10q11",question:'Was ist die wichtigste Lektion von "Verhalten nach Gewalt" rechtlich?',options:["Sofort alles erklären","Keine Aussagen ohne Anwalt — auch wenn man im Recht war","Zeugen sammeln","Den Angreifer nicht anzeigen"],correctIndex:1,explanation:"Keine Aussagen ohne Anwalt — auch nach rechtmäßiger Notwehr kann jede Aussage gegen einen verwendet werden. Das ist eines der wichtigsten rechtlichen Grundprinzipien."},{id:"m10q12",question:'Was ist "Force Continuum" im M.I. Kontext?',options:["Dauerhafte Gewaltanwendung","Die abgestufte Eskalation von Reaktionen entsprechend der Bedrohung","Militärisches Konzept","Nur für Polizei relevant"],correctIndex:1,explanation:"Force Continuum bedeutet: die Reaktion ist proportional zur Bedrohung. Von verbaler Deeskalation → non-lethal → Notwehr. Überschreitung hat rechtliche Konsequenzen."},{id:"m10q13",question:"Warum werden Szenarien mit mehreren Gegnern trainiert?",options:["Weil sie häufig sind","Weil mehrere Gegner fundamental andere Taktik erfordern als 1-gegen-1","Für Fortgeschrittene nur","Wegen des Trends im Kampfsport"],correctIndex:1,explanation:"Mehrere Gegner erfordern komplett andere Taktik: nie in die Mitte geraten, immer Positionierung nutzen, schnell entscheiden wer priorisiert wird — dafür braucht es spezifisches Training."},{id:"m10q14",question:"Was ist die psychologische Komponente von Modul 10?",options:["Keine","Verarbeitung des Erlebten — Szenarien können psychisch belastend sein und das Verhalten danach trainiert wird","Mentaltraining","Stressabbau"],correctIndex:1,explanation:"Realistische Szenarien können psychisch belastend sein — Modul 10 trainiert auch die Verarbeitung des Erlebten und das psychologisch richtige Verhalten nach einem echten Konflikt."},{id:"m10q15",question:"Was ist der Unterschied zwischen Taktik und Technik?",options:["Kein Unterschied",'Technik ist das "Wie" einer Bewegung; Taktik ist das "Wann, Wo und Warum" des Handelns',"Taktik ist fortgeschrittener","Technik ist für Anfänger"],correctIndex:1,explanation:"Technik = die Ausführung (wie du blockst, schlägst, falls). Taktik = die Entscheidung (wann du handelst, wo du dich positionierst, welche Technik die Situation verlangt)."}],Jm={"mod-1":tb,"mod-2":nb,"mod-3":ib,"mod-4":rb,"mod-5":sb,"mod-6":ab,"mod-7":lb,"mod-8":Qm,"mod-8-adv":Qm,"mod-9":ob,"mod-10":cb};function yd(s,r){var l={};for(var o in s)Object.prototype.hasOwnProperty.call(s,o)&&r.indexOf(o)<0&&(l[o]=s[o]);if(s!=null&&typeof Object.getOwnPropertySymbols=="function")for(var u=0,o=Object.getOwnPropertySymbols(s);u<o.length;u++)r.indexOf(o[u])<0&&Object.prototype.propertyIsEnumerable.call(s,o[u])&&(l[o[u]]=s[o[u]]);return l}function db(s,r,l,o){function u(h){return h instanceof l?h:new l(function(f){f(h)})}return new(l||(l=Promise))(function(h,f){function m(v){try{g(o.next(v))}catch(j){f(j)}}function p(v){try{g(o.throw(v))}catch(j){f(j)}}function g(v){v.done?h(v.value):u(v.value).then(m,p)}g((o=o.apply(s,r||[])).next())})}const ub=s=>s?(...r)=>s(...r):(...r)=>fetch(...r);class Uh extends Error{constructor(r,l="FunctionsError",o){super(r),this.name ~DISCLAIMER
Die in diesem Modul vermittelten rechtlichen Inhalte dienen ausschließlich der allgemeinen Orientierung und dem grundlegenden Verständnis von Selbstverteidigungs- und Notwehrsituationen, damit du nicht nur Gefahren, sondern auch rechtliche Folgen besser einschätzen kannst.

Sie stellen keine Rechtsberatung dar und ersetzen keine individuelle juristische Beratung durch einen qualifizierten Rechtsanwalt.

Es wird keine Gewähr für Vollständigkeit, Aktualität oder rechtliche Verbindlichkeit übernommen, da sich Gesetze jederzeit ändern können. Die Anwendung erfolgt auf eigene Verantwortung.

**Im Einzelfall gilt: Konsultiere einen Rechtsanwalt.**

---

### § 32 StGB — Notwehr

**„Wer eine Tat begeht, die durch Notwehr geboten ist, handelt nicht rechtswidrig."**

Notwehr ist die Verteidigung, die erforderlich ist, um einen **gegenwärtigen, rechtswidrigen Angriff** von sich oder einem anderen abzuwenden.

**Wichtig:** § 32 StGB gilt **nur bei Angriffen von Menschen**. Für Tierangriffe oder Gefahren durch Sachen gilt § 228 BGB.

**Drei Grundvoraussetzungen der Strafbarkeit:**
1. **Tatbestand** — Die Handlung ist im Gesetz als Straftat beschrieben
2. **Rechtswidrigkeit** — Es liegt kein Rechtfertigungsgrund vor (z.B. Notwehr)
3. **Schuld** — Der Täter ist schuldfähig

---

### § 33 StGB — Überschreitung der Notwehr

Wer die Grenzen der Notwehr aus **Verwirrung, Furcht oder Schrecken** überschreitet, wird **nicht bestraft**.

Das bedeutet: Wenn du im Moment extremen Stresses mehr tust als nötig — weil du Angst hattest — bist du strafrechtlich geschützt. Dieser Paragraph ist dein Sicherheitsnetz.

---

### § 34 StGB — Rechtfertigender Notstand

Handelt jemand in einer **Notstandslage**, um eine Gefahr für sich oder andere abzuwenden, handelt er nicht rechtswidrig — **wenn das geschützte Rechtsgut wesentlich höherwertig ist als der entstandene Schaden**.

Beispiel: Einschlagen einer Autoscheibe, um ein eingesperrtes Kind zu retten.

---

### § 227 BGB — Notwehr (Zivilrecht)

Entspricht inhaltlich § 32 StGB — gilt ebenfalls **nur für menschliche Angriffe**.

---

### § 228 BGB — Notstand (Tierangriff / Sachgefahr)

Greift ein **Tier** an oder geht eine Gefahr von einer **Sache** aus, gilt § 228 BGB als Rechtsgrundlage für Selbstschutz. Nicht § 32 StGB.

---

### § 223 StGB — Einfache Körperverletzung

**Strafe:** Bis zu 5 Jahre Freiheitsstrafe oder Geldstrafe.

**„Wer eine andere Person körperlich misshandelt oder an der Gesundheit schädigt, wird bestraft."**

Abs. 2: **„Der Versuch ist strafbar."** — auch ein Angriff der nicht trifft kann strafbar sein.

---

### § 224 StGB — Gefährliche Körperverletzung

**Strafe:** Freiheitsstrafe von **6 Monaten bis 10 Jahren**.

Merkmale (5 alternative Tatbestandsvarianten):
- Durch **Gift** oder gesundheitsschädliche Stoffe
- Mittels einer **Waffe oder eines Werkzeugs**
- Durch einen **hinterlistigen Überfall**
- **Gemeinschaftlich** mit anderen
- Auf eine das **Leben gefährdende** Weise

---

### § 226 StGB — Schwere Körperverletzung

**Strafe:** Freiheitsstrafe von **1 bis 10 Jahren**. Bei Absicht: mindestens **3 Jahre**.

Gilt bei dauerhaften schweren Folgen:
- Verlust des **Sehvermögens** (ein oder beide Augen)
- Verlust des **Gehörs** oder der Sprache
- Verlust eines **Körperteils**
- Dauerhafte **Entstellung**
- Schwere Behinderung, Geisteskrankheit, Lähmung

---

### § 323c StGB — Unterlassene Hilfeleistung

**Strafe:** Bis zu **1 Jahr** Freiheitsstrafe oder Geldstrafe.

Wer bei einem **Unglücksfall, einer gemeinen Gefahr oder Not** keine Hilfe leistet, obwohl dies **möglich und zumutbar** war, macht sich strafbar.

**Relevanz für uns:** Nach einem Konflikt bist du u.U. verpflichtet, dem Verletzten Hilfe zu leisten — auch wenn er der Angreifer war.

---

### Putativnotwehr

**Irrtümliche Notwehr** — der Täter glaubt fälschlicherweise, dass die Voraussetzungen der Notwehr vorliegen, obwohl das tatsächlich nicht so ist.

Beispiel: Jemand greift nach einer Plastikpistole — du siehst nur die Pistole und reagierst mit Notwehr. Strafbarkeit wird hier individuell bewertet.`},{id:"verhaltensrichtlinien",moduleId:"mod-1",title:"7 Verhaltensrichtlinien",icon:"📋",order:2,theoryText:`## Die 7 Verhaltensrichtlinien

Diese 7 Regeln sind die Grundlage jedes Handelns im M.I. System. Nicht als Einschränkung — sondern als Kompass.

---

### Richtlinie 1 — Sei vorbereitet

Vorbereitung beginnt **vor** dem Konflikt — nicht wenn er bereits da ist.

**Die vier Vorbereitungsebenen:**

1. **Physisch** — Kraft- und Selbstverteidigungstraining. Dein Körper ist dein wichtigstes Werkzeug.
2. **Mental** — Routine und regelmäßiges Training. Mentale Stärke entsteht durch Wiederholung, nicht durch Talent.
3. **Emotional** — Sparring und Stresstraining. Lerne, unter Druck zu funktionieren, bevor du es im Ernstfall musst.
4. **Taktisch** — Umgang mit Tools: Pfefferspray, Tactical Pen, Messer, Stock. Handlung beginnt vor dem Konflikt.

---

### Richtlinie 2 — Vermeide Konfliktsituationen

**„Der beste Kampf ist der, der nicht stattfindet."**

- Meide Orte mit hohem Konfliktpotenzial
- Erkenne Gefahren frühzeitig (Situational Awareness)
- Handle deeskalierend — Sprache ist deine erste Waffe
- Flucht ist keine Niederlage — sie ist die intelligentere Option

---

### Richtlinie 3 — Halte deine Waffe einsatzbereit

Wenn du eine Waffe bei dir trägst, muss sie **einsatzbereit** sein — nicht irgendwo versteckt oder gesichert.

**Definitionen:**
- **Einsatzbereit** = Eine Bewegung bis zum effektiven Einsatz
- **Griffbereit** = Zwei bis drei Bewegungen bis zum effektiven Einsatz

Dein Ziel: So wenige Bewegungen wie möglich zwischen dir und der Handlungsfähigkeit.

---

### Richtlinie 4 — Kontrolliere die Distanz

**„Wer die Distanz kontrolliert, kontrolliert das Geschehen."**

Du bestimmst die Distanz — nicht dein Gegner. Die Distanz entscheidet:
- Ob der Gegner überhaupt angreifen kann
- Welche Techniken er einsetzen kann
- Welche Techniken du einsetzen kannst

Distanzmanagement ist keine Defensive — es ist Dominanz.

---

### Richtlinie 5 — Rechne damit, verletzt zu werden

Dies ist eine der wichtigsten mentalen Vorbereitung überhaupt.

**Worum geht es?**
- Mentale Vorbereitung darauf, getroffen zu werden
- Training unter Druck und realem Schmerz
- Stresssituationen erleben, bevor sie echt werden
- Mit Schmerz umgehen können, ohne handlungsunfähig zu werden

Wer noch nie unter Druck geübt hat, wird im Ernstfall einfrieren. Wer es kennt, reagiert.

---

### Richtlinie 6 — Wenn du getroffen wirst: mach weiter

**Kämpfe weiter. Reagiere weiter. Oder flieh.**

Der Gegner macht nach einem Treffer auch weiter — das musst du verinnerlichen.

Ein Treffer ist kein Ende. Ein Treffer ist Feedback. Verarbeite ihn und handle.

- Kein Innehalten
- Kein Zögern
- Kein Schock-Freeze

Dein Körper kann mehr als dein Kopf im Moment glaubt.

---

### Richtlinie 7 — Prüfe dich nach dem Konflikt

**„Geh NICHT davon aus, dass alles okay ist."**

Nach einem Konflikt:
1. **Körper aktiv abtasten** — von Kopf bis Fuß
2. **Auf Blut achten** — auch unter der Kleidung
3. **Stop the Bleed anwenden** wenn nötig

Adrenalin maskiert Schmerz. Du kannst schwer verletzt sein und es erst nach Minuten oder Stunden bemerken. Handle sofort.`},{id:"stellungen",moduleId:"mod-1",title:"Stellungen & Positionen",icon:"🥋",order:3,theoryText:`## Stellungen & Positionen

Die vier Grundstellungen im M.I. System sind keine starren Posen — sie sind dynamische Bereitschaftsstufen. Du wechselst zwischen ihnen je nach Situation.

---

### Neutrale Position

**Alltagshaltung** — unauffällig, entspannt, kein Signal an die Umgebung.

Keine kampfsportliche Grundstellung. Du stehst wie jeder andere Mensch. Diese Position signalisiert weder Konfliktbereitschaft noch Unterwerfung.

**Einsatz:** Alltag, soziale Interaktionen, öffentliche Orte.

---

### Ready Position

**Potenzielle Konfliktsituation** — du bist vorbereitet, ohne Aggression zu signalisieren.

Die Ready Position ist subtil:
- Körper leicht gedreht (kleinere Zielscheibe)
- Hände neutral aber verfügbar
- Füße positioniert für sofortige Reaktion
- Mentaler Zustand: aufmerksam, nicht reaktiv

**Einsatz:** Wenn etwas nicht stimmt. Wenn du eine Bedrohung spürst, aber noch kein direkter Kontakt besteht.

---

### Contact Ready Position

**Tatsächlicher oder unmittelbar bevorstehender Kontakt.**

**Kernregel:** Sobald Kontakt entsteht → Contact Ready.

Merkmale:
- **Tieferer Körperschwerpunkt** — mehr Stabilität
- **Hände höher und kampfbereiter** — sofort verfügbar
- **Füße klar versetzt** — für Beweglichkeit und Balance
- Auf Stabilität, Agilität und sofortige Handlungsfähigkeit ausgelegt

Diese Stellung ist auf **tatsächlichen Kampf** ausgelegt — keine halben Maßnahmen.

**Einsatz:** Sobald Kontakt entsteht oder unmittelbar bevorsteht.

---

### Strong-Side-Forward

**Die starke (dominante) Seite ist vorne.**

Das klingt kontraintuitiv — die meisten Kampfsportarten halten die starke Hand hinten für mehr Kraftaufbau. M.I. geht den anderen Weg.

**Warum?**
- Kürzerer Weg zum Ziel → schnellere Aktion
- Mehr Überraschungseffekt
- Universell einsetzbar: mit blöder Hand UND mit Tool (Pfefferspray, Messer, Stock)

**Einsatz:** Wenn mit Werkzeug oder dominanter Hand angegriffen/verteidigt wird.`},{id:"eingaenge",moduleId:"mod-1",title:"Eingänge & Auslagenwechsel",icon:"↔️",order:4,theoryText:`## Eingänge & Auslagenwechsel

Eingänge beschreiben, **wie du in die Contact Ready Position eintrittst**. Auslagenwechsel beschreiben, **wie du deine führende Seite wechselst**.

---

## Eingänge in die Contact Ready Position

### Defensiver Eingang

**Schritt zurück** — Übergang in Contact Ready durch Rückwärtsbewegung.

Du schaffst Distanz und nimmst gleichzeitig die kampfbereite Position ein. Ideal wenn der Gegner vorwärts kommt und du Zeit brauchst.

### Offensiver Eingang

**Schritt nach vorne** — Übergang in Contact Ready durch Vorwärtsbewegung.

Du verkürzt die Distanz aktiv und greifst die Initiative. Für den offensiven Einstieg in eine Situation.

### Aggressiver Eingang

**Schritt nach vorne + sofortiger Angriff** — kein Zögern, direkter Einstieg.

Du bewegst dich nicht nur vorwärts — du kombinierst die Bewegung direkt mit einer Technik. Die Aktion beginnt mit der Bewegung.

---

## Die 4 Auslagenwechsel

Auslagenwechsel ermöglichen es, die führende Seite zu wechseln — taktisch, um die starke Seite nach vorne zu bringen oder den Gegner zu täuschen.

---

### Vorderer Wechsel

- Der **vordere Fuß** leitet den Wechsel ein
- Danach wird der hintere Fuß passend nachgeführt
- Nacheinander, kontrolliert

**Einsatz:** Kontrollierter Wechsel wenn Zeit vorhanden.

---

### Hinterer Wechsel

- Der **hintere Fuß** leitet den Wechsel ein
- Danach folgt der vordere Fuß in die neue Position
- Nacheinander, reaktiv

**Einsatz:** Reaktiver Wechsel, oft nach einer Bewegung initiiert.

---

### Switch

- **Beide Füße nahezu gleichzeitig** — schnell und explosiv
- Maximale Geschwindigkeit, minimale Bodenhaftungsphase

**Einsatz:** Schneller Wechsel unter Zeitdruck oder als Täuschungsmanöver.

---

### Schritt (Step)

- Ein Fuß geht am anderen **vorbei nach vorne**
- Kontrolliert, nacheinander
- Der kontrollierteste Wechsel

**Einsatz:** Wenn Kontrolle über Geschwindigkeit geht.

---

**Faustregel:** Switch = explosiv, Schritt = kontrolliert. Beide haben ihren Platz — kenne den Unterschied.`},{id:"distanz",moduleId:"mod-1",title:"Distanzmanagement",icon:"📏",order:5,theoryText:`## Distanzmanagement

**„Wer die Distanz kontrolliert, kontrolliert das Geschehen."**

Distanzmanagement ist eine der wichtigsten Fähigkeiten im M.I. System. Es geht nicht darum, weit weg zu bleiben — es geht darum, **die Distanz zu bestimmen**: wann du nah bist, wann du Abstand schaffst, und wie du das kontrolliert tust.

---

## Die 3 Grundbewegungen

### Step & Slide

**Kontrollierte, stabile Bewegung.**

- Zuerst ein Schritt in die gewünschte Richtung
- Dann wird der andere Fuß nachgezogen (Slide)
- Füße bleiben immer auf Schulterbreite
- Kreuzen der Füße wird vermieden

**Eigenschaft:** Kontrollierteste und stabilste Bewegung — für Situationen wo Präzision wichtiger ist als Geschwindigkeit.

**Einsatz:** Seitliche Bewegung, Positionieren, kontrollierter Rückzug.

---

### Slide-Step

**Schnelle, reaktive Bewegung.**

**Das unveränderliche Grundprinzip:** Die **Gleitbewegung (Slide) kommt immer zuerst** — dann folgt der Schritt (Step).

- **Vorwärts:** Der hintere Fuß gleitet zuerst, dann folgt der vordere
- **Rückwärts:** Der vordere Fuß gleitet aus der Gefahrenzone (Slide), dann folgt der hintere (Step)

**Eigenschaft:** Schneller als Step & Slide — ideal für reaktive Defensive.

**Einsatz:** Ausweichen, reaktive Distanzveränderung.

---

### Push

**Explosive, maximale Distanzveränderung.**

Kein "Gehen" — ein explosiver Abdrück-Impuls der dich oder deinen Gegner sofort bewegt. Der Push kommt zum Einsatz, wenn **Zeit ein kritischer Faktor** ist.

**Eigenschaft:** Explosivste Bewegung im System — für sofortige Reaktion.

**Einsatz:** Wenn du keine Zeit hast zu "gehen" — du brauchst sofort Distanz oder willst sofort verkürzen.

---

## Mirror Drills — Distanzgefühl trainieren

### Mirror Drill 1

Partner kopiert die **Schritte** des Führenden. Ziel: Reaktion auf Bewegungen trainieren, Fußarbeit koordinieren.

### Mirror Drill 2

Ziel: die **Distanz zum Partner halten** — egal wie er sich bewegt. Wenn er vorwärts kommt, du zurück. Wenn er zurückgeht, du vor.

Mirror Drill 2 trainiert das Herzstück des Distanzmanagements: automatisches, unbewusstes Distanzgefühl.

---

## Zusammenfassung

| Bewegung | Eigenschaft | Einsatz |
|---|---|---|
| Step & Slide | Kontrolliert & stabil | Positionieren |
| Slide-Step | Schnell & reaktiv | Ausweichen |
| Push | Explosiv & maximal | Sofortreaktion |`},{id:"angriffe",moduleId:"mod-1",title:"Grundtechniken & Angriffe",icon:"👊",order:6,theoryText:`## Grundtechniken & Angriffe

Die Grundtechniken des M.I. Systems sind praxiserprobt und auf **reale Konfliktsituationen** ausgelegt — nicht auf Sport oder Wettkampf. Jede Technik hat einen klaren Zweck.

---

## Hand- und Armtechniken

### Jab
Schneller, direkter Schlag mit der vorderen Hand. Kein Kraftschlag — ein Abstandshalter, Störer und Einleitung für Kombinationen. Der Jab schafft Zeit und setzt Marken.

### Cross (Gegengerade)
Kraftschlag mit der hinteren Hand. Volle Körperdrehung, maximale Kraftentfaltung. Der Cross ist der Finisher — er kommt nach dem Jab.

### Slap (Ohrfeige / Flachhand)
Offene Hand, Schlag auf Ohr oder Kopfseite. Erzeugt Schock durch Druckwelle im Ohr. Auf kurze Distanz effektiv.

### Fingerstich

**Ziel:** Das Auge des Gegners.

Der Fingerstich ist kein Kraftangriff — er ist ein **Schockauslöser**. Ein Treffer am Auge erzeugt eine unwillkürliche Schutzreaktion: der Gegner schließt die Augen, dreht den Kopf weg, verliert kurz die Orientierung.

**Das schafft Zeit** — für weitere Aktionen, für Flucht, für den nächsten Angriff.

**Wichtig:**
- Effektiv auf **mittlerer bis naher Distanz**
- Präzision wird durch Training verbessert
- Nicht aus großer Entfernung einsetzen ohne Training

### Ellbogen (Elle)

Im Infight — auf **engem Raum** — ist der Ellbogen dem Faustschlag überlegen.

**Warum?**
- Kurze Wege — keine große Ausholbewegung nötig
- Harte Aufprallfläche
- Kann im Clinch voll eingesetzt werden

Einsatz: Kinnhaken-ähnlich horizontal, seitlicher Aufwärtshaken, rückwärts (Rückstoß).

### Haken

Bogenförmiger Schlag seitlich auf Kinn, Schläfe oder Rippen. Kommt von der Seite — schwerer zu sehen als Jab oder Cross.

### Uppercut

Aufwärtsschlag unter das Kinn oder in den Solar Plexus. Auf kurze Distanz — hebt den Gegner leicht an und erschüttert die Wirbelsäule.

---

## Kontroll- und Greiftechniken

### Nackenzug

**Primärziel:** Kontrolle — nicht Schmerz.

Der Nackenzug greift **Nacken und Hinterkopf**. Von dort lässt sich der gesamte Körper des Gegners steuern: Kopf nach unten, Körper folgt.

**Klassische Kombo:** Nackenzug → Kopf nach unten → Knie hoch. Kurz, explosiv, effektiv.

### Clinch

Nahkampf-Körperkontakt — beide Körper sind ineinander. Im Clinch:
- Fäuste und Kicks können nicht mehr voll ausgeführt werden
- Knie und Ellbogen sind die dominanten Waffen
- Kontrolle über Gleichgewicht und Position entscheidet

---

## Knie-Techniken

**Knie** sind auf **engem Raum** besonders wirksam — kurze Wege, harte Aufprallfläche, maximale Wirkung ohne Ausholraum.

Kombination mit Nackenzug ist klassisch: Kopf wird durch Nackenzug nach unten gezogen, Knie kommt entgegen.

---

## Kick-Techniken

### Stoppkick (vorne und hinten)

**Der Stoppkick ist defensiv-offensiv.** Er stoppt den eingehenden Angriff UND greift gleichzeitig an.

**Schlüsselprinzip:** Der Stoppkick lebt vom **Timing**. Er trifft den Gegner **im Moment seiner Vorwärtsbewegung** — die kinetische Energie des Angreifers wird gegen ihn genutzt.

- Wenn der Gegner steht: normale Wirkung
- Wenn der Gegner vorwärtsläuft: Wirkung verdoppelt sich durch seinen eigenen Impuls

Ziel: Oberschenkel, Hüfte, Körpermitte. Tief und stabil.

### Weitere Kicks (Kick 2–7)

Variationen von Seiten-, Aufwärts- und Rückwärtskicks für unterschiedliche Distanzen und Winkel. Werden in den späteren Technikanteilen des Moduls vertieft.`}],Fw=[...Vw];function Bh(s){return Fw.filter(r=>r.moduleId===s).sort((r,l)=>r.order-l.order)}function Zw(s){return!s||s.status==="not_tested"?(s?.practiceCount??0)>0?{label:"Im Training",color:"text-blue-400",bg:"bg-blue-500/10 border-blue-500/20"}:{label:"Noch nicht trainiert",color:"text-gray-500",bg:"bg-gray-700/20 border-gray-700/30"}:s.status==="needs_training"?{label:"Im Training",color:"text-blue-400",bg:"bg-blue-500/10 border-blue-500/20"}:s.status==="tech_pending"||s.status==="tac_pending"?{label:"Prüfung ausstehend",color:"text-yellow-400",bg:"bg-yellow-500/10 border-yellow-500/20"}:s.status==="tech_passed"?{label:"Technisch ✓",color:"text-orange-400",bg:"bg-orange-500/10 border-orange-500/20"}:s.status==="tac_passed"?{label:"Bestanden ✓",color:"text-green-400",bg:"bg-green-500/10 border-green-500/20"}:{label:"–",color:"text-gray-500",bg:"bg-gray-700/20 border-gray-700/30"}}const Qw=({module:s,bestScore:r,sessions:l,questionCount:o,answeredCount:u,displayName:h,onStart:f})=>{const m=o>0,p=(r??0)>=70,g=r??0;return n.jsxs("button",{onClick:m?f:void 0,disabled:!m,className:`w-full text-left rounded-xl border p-3 transition-all flex flex-col gap-2.5 ${m?p?"bg-green-500/10 border-green-500/30 hover:border-green-500/50 active:scale-95":"bg-gray-800/50 border-gray-700 hover:border-gray-500 active:scale-95":"bg-gray-800/20 border-gray-700/30 opacity-40 cursor-not-allowed"}`,children:[n.jsxs("div",{className:"flex items-start justify-between gap-2",children:[n.jsxs("div",{className:"relative flex-shrink-0 w-12 h-12",children:[n.jsxs("svg",{className:"w-12 h-12 -rotate-90",viewBox:"0 0 48 48",children:[n.jsx("circle",{cx:"24",cy:"24",r:"20",fill:"none",stroke:"#374151",strokeWidth:"4"}),n.jsx("circle",{cx:"24",cy:"24",r:"20",fill:"none",stroke:p?"#22c55e":g>0?"#f97316":"#4b5563",strokeWidth:"4",strokeDasharray:
